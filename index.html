<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eleanor & Sebastian | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Sorts+Mill+Goudy:ital@0;1&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --glass:rgba(255,255,255,0.06);
  --text:#f5f5f5;
  --accent:#c0c0c0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Sorts Mill Goudy', serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* BLOOM REVEAL */
#reveal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#050507;
  z-index:1000;
  cursor:pointer;
}

.rose{
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ff4d6d, #2b0000);
  box-shadow:0 0 40px rgba(255,0,80,0.4);
  transition:2s ease;
}

#reveal.active .rose{
  transform:scale(3);
  opacity:0;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:2;
  padding:20px;
}

.hero h1{
  font-family:'UnifrakturMaguntia', cursive;
  font-size:clamp(2.5rem,6vw,5rem);
}

.hero p{
  opacity:0.8;
  margin-top:10px;
}

/* TIMELINE */
.section{
  position:relative;
  z-index:2;
  padding:100px 20px;
  max-width:900px;
  margin:auto;
}

.title{
  text-align:center;
  font-size:2rem;
  margin-bottom:60px;
  letter-spacing:2px;
}

.timeline{
  display:flex;
  flex-direction:column;
  gap:40px;
}

.event{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:var(--glass);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:12px;
}

.event:nth-child(even){
  flex-direction:row-reverse;
}

/* RSVP */
.rsvp{
  text-align:center;
}

button{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  background:var(--accent);
  color:#000;
  cursor:pointer;
  border-radius:8px;
  font-weight:bold;
}

#countdown{
  margin-top:20px;
  font-size:1.2rem;
  opacity:0.8;
}

/* SCROLL */
.section{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- BLOOM REVEAL -->
<div id="reveal">
  <div class="rose"></div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Eleanor & Sebastian</h1>
  <p>18 October 2027 • Ravenhall Estate • Edinburgh</p>
</div>

<!-- TIMELINE -->
<div class="section">
  <div class="title">Order of the Day</div>
  <div class="timeline">
    <div class="event"><span>Ceremony</span><span>5:00 PM</span></div>
    <div class="event"><span>Cocktail Hour</span><span>6:00 PM</span></div>
    <div class="event"><span>Dinner</span><span>7:30 PM</span></div>
    <div class="event"><span>First Dance</span><span>9:00 PM</span></div>
  </div>
</div>

<!-- RSVP -->
<div class="section rsvp">
  <div class="title">RSVP</div>
  <p>rsvp@ravenhallestate.com</p>
  <p>Deadline: 15 September 2027</p>

  <div id="countdown"></div>

  <button onclick="window.location.href='mailto:rsvp@ravenhallestate.com'">
    Send RSVP
  </button>

  <p style="margin-top:40px;font-style:italic;opacity:0.7;">
    Two lives, one horizon, endlessly unfolding.
  </p>
</div>

<script>
/* REVEAL */
const reveal = document.getElementById("reveal");
reveal.addEventListener("click", () => {
  reveal.classList.add("active");
  setTimeout(() => reveal.style.display="none", 1200);
});

/* SCROLL OBSERVER */
const sections = document.querySelectorAll(".section");
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
},{threshold:0.2});

sections.forEach(s=>obs.observe(s));

/* RAIN ON GLASS */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = Array(120).fill().map(()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  l:Math.random()*20+10,
  s:Math.random()*2+1
}));

function rain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(200,200,255,0.15)";
  ctx.lineWidth=1;

  for(let d of drops){
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x,d.y+d.l);
    ctx.stroke();

    d.y += d.s;
    if(d.y>canvas.height){
      d.y=-20;
      d.x=Math.random()*canvas.width;
    }
  }
  requestAnimationFrame(rain);
}
rain();

/* COUNTDOWN */
const deadline = new Date("2027-09-15").getTime();
const cd = document.getElementById("countdown");

setInterval(()=>{
  const now = new Date().getTime();
  const t = deadline - now;

  const d = Math.floor(t/(1000*60*60*24));
  const h = Math.floor((t%(1000*60*60*24))/(1000*60*60));

  cd.innerHTML = `${d} days ${h} hours remaining`;
},1000);

</script>

</body>
</html>
